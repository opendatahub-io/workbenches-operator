{{- if .Values.webhooks.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "workbenches-operator.prefixed" (list . "webhook-tls-rolebinding") }}
  namespace: {{ .Values.operatorNamespace | quote }}
  labels:
    {{- include "workbenches-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "workbenches-operator.webhookTLSRoleName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "workbenches-operator.serviceAccountName" . }}
    namespace: {{ .Values.operatorNamespace | quote }}
{{- end }}

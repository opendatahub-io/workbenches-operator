name: Test

on:
  push:
    branches: [main, stable, v1.x]
  pull_request:
    branches: [main, stable, v1.x]
  workflow_dispatch:

jobs:
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@v7
        with:
          check-latest: true
          go-version-file: go.mod

      - name: Run unit tests
        run: make unit-test

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: cover.out

      - name: Upload results to Codecov
        if: always()
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./cover.out
          flags: unit-tests
          disable_search: true

      - name: Coverage summary
        if: always()
        run: go tool cover -func=cover.out | tail -1

  manifest-render-test:
    name: Manifest Rendering
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@v7
        with:
          check-latest: true
          go-version-file: go.mod

      - name: Validate manifest rendering
        run: go test ./internal/controller/ -run TestRenderRealManifests -v -count=1

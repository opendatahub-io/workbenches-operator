# Minimal HardwareProfile CRD for e2e tests on Kind.
# The canonical CRD is generated by the opendatahub-operator from Go types in
# api/infrastructure/v1/hardwareprofile_types.go — this is a lightweight copy
# that covers the fields exercised by our webhook tests.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: hardwareprofiles.infrastructure.opendatahub.io
spec:
  group: infrastructure.opendatahub.io
  names:
    kind: HardwareProfile
    listKind: HardwareProfileList
    plural: hardwareprofiles
    singular: hardwareprofile
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              properties:
                identifiers:
                  type: array
                  items:
                    type: object
                    required: [displayName, identifier, minCount, defaultCount]
                    properties:
                      displayName:
                        type: string
                      identifier:
                        type: string
                      minCount:
                        x-kubernetes-int-or-string: true
                        anyOf:
                          - type: integer
                          - type: string
                      maxCount:
                        x-kubernetes-int-or-string: true
                        anyOf:
                          - type: integer
                          - type: string
                      defaultCount:
                        x-kubernetes-int-or-string: true
                        anyOf:
                          - type: integer
                          - type: string
                      resourceType:
                        type: string
                        enum: [CPU, Memory, Accelerator]
                scheduling:
                  type: object
                  required: [type]
                  x-kubernetes-validations:
                    - rule: "self.type == 'Queue' ? (has(self.kueue) && has(self.kueue.localQueueName) && !has(self.node)) : true"
                      message: "When schedulingType is 'Queue', the 'kueue.localQueueName' field must be specified and non-empty, and the 'node' field must not be set"
                    - rule: "self.type == 'Node' ? (has(self.node) && !has(self.kueue)) : true"
                      message: "When schedulingType is 'Node', the 'node' field must be set, and the 'kueue' field must not be set"
                  properties:
                    type:
                      type: string
                      enum: [Queue, Node]
                    kueue:
                      type: object
                      required: [localQueueName]
                      properties:
                        localQueueName:
                          type: string
                          minLength: 1
                        priorityClass:
                          type: string
                    node:
                      type: object
                      properties:
                        nodeSelector:
                          type: object
                          additionalProperties:
                            type: string
                        tolerations:
                          type: array
                          items:
                            type: object
                            properties:
                              key:
                                type: string
                              operator:
                                type: string
                              value:
                                type: string
                              effect:
                                type: string
                              tolerationSeconds:
                                type: integer
                                format: int64
            status:
              type: object

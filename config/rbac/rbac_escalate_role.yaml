# Hand-maintained: escalate and bind scoped to specific upstream manifest resources.
# kubebuilder markers don't support resourceNames, so this ClusterRole is maintained
# separately. Update resourceNames when upstream manifests add/rename ClusterRoles.
#
# escalate is required for ClusterRoles with aggregationRules.
# bind is required for ClusterRoleBindings referencing roles beyond this SA's permissions.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-rbac-escalate-role
rules:
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - clusterroles
  verbs:
  - bind
  - escalate
  resourceNames:
  # kf-notebook-controller ClusterRoles (namePrefix: notebook-controller-)
  - notebook-controller-kubeflow-notebooks-admin
  - notebook-controller-kubeflow-notebooks-edit
  - notebook-controller-kubeflow-notebooks-view
  - notebook-controller-role
  - notebook-controller-proxy-role
  # odh-notebook-controller ClusterRoles (namePrefix: odh-notebook-controller-)
  - odh-notebook-controller-notebooks-admin
  - odh-notebook-controller-notebooks-edit
  - odh-notebook-controller-notebooks-view
  - odh-notebook-controller-manager-role
